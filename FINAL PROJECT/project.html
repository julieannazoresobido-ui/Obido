<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Little Store</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="container">
        <h1>J's Bakery</h1>

        <h2>Pastries</h2>
        <div id="product-list" class="products"></div>

        <div class="cart-section">
            <h3>Your Cart <span id="cart-count" class="badge">0</span></h3>
            <div id="cart-items"></div>
            <div id="cart-empty" class="empty-msg">Your cart is empty.</div>
            <div class="total">
                <strong>Total: </strong>
                Php <span id="cart-total">0.00</span> 
            </div>
            <button id="clear-cart" class="clear-btn">Clear Cart</button>

        </div>
    </div>

    <script src="./cart.js"></script>
</body>
</html>
